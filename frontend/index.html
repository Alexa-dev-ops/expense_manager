<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Expense Manager</h1>
      <div class="summary">Total Spent: ₦<span id="total-amount">0.00</span></div>
    </header>

    <main>
      <section class="form-section">
        <h2>Add Expense</h2>
        <form id="expense-form">
          <div class="form-group">
            <label for="amount">Amount *</label>
            <input type="number" id="amount" step="0.01" min="0.01" required>
          </div>
          <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" required>
              <option value="" disabled selected>Select a category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Bills">Bills</option>
              <option value="Shopping">Shopping</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date">
          </div>
          <div class="form-group">
            <label for="description">Description (Optional)</label>
            <input type="text" id="description" placeholder="e.g. Lunch with client">
          </div>
          <div id="error-message" class="error hidden"></div>
          <button type="submit" class="btn">Save Expense</button>
        </form>
      </section>

      <section class="list-section">
        <h2>Recent Expenses</h2>
        <div id="expense-list" class="expense-list">
          </div>
        <div id="empty-state" class="empty-state hidden">
          <p>No expenses yet. Add one above!</p>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
